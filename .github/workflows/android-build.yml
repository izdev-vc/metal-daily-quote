name: Android Production Build
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Pobranie kodu z repozytorium
        uses: actions/checkout@v4

      - name: ⚙️ Konfiguracja środowiska Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: ⚙️ Konfiguracja Java (wymagana dla Androida)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Konfiguracja Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Instalacja bibliotek (dependencies)
        run: npm install

      - name: 🔑 Dekodowanie i przygotowanie klucza Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-upload-key.keystore

      - name: 🚀 Budowanie aplikacji Android (Plik produkcyjny AAB)
        env:
          MYAPP_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: 💾 Zapisanie gotowego pliku aplikacji
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/app-release.aab